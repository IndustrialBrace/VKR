<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 320" font-family="Times New Roman, serif" font-size="13">
  <text x="360" y="22" text-anchor="middle" font-size="15">Жизненный цикл инновационного продукта</text>

  <line x1="60"  y1="260" x2="680" y2="260" stroke="#333"/>
  <line x1="60"  y1="60"  x2="60"  y2="260" stroke="#333"/>
  <polygon points="680,260 672,256 672,264" fill="#333"/>
  <polygon points="60,60 56,68 64,68" fill="#333"/>
  <text x="688" y="264" font-size="11">время</text>
  <text x="40"  y="56"  font-size="11">объём продаж</text>

  <!-- кривая жизненного цикла -->
  <path d="M 60,255 C 110,250 140,225 200,200 C 260,170 320,90 400,80 C 480,72 540,150 600,210 C 640,245 660,255 680,258"
        fill="none" stroke="#1a5a92" stroke-width="2"/>

  <!-- разделители фаз -->
  <g stroke="#bbb" stroke-dasharray="3,3">
    <line x1="150" y1="60" x2="150" y2="260"/>
    <line x1="270" y1="60" x2="270" y2="260"/>
    <line x1="430" y1="60" x2="430" y2="260"/>
    <line x1="560" y1="60" x2="560" y2="260"/>
  </g>

  <g font-size="12" text-anchor="middle">
    <text x="105" y="285">Разработка</text>
    <text x="210" y="285">Внедрение</text>
    <text x="350" y="285">Рост</text>
    <text x="495" y="285">Зрелость</text>
    <text x="620" y="285">Спад</text>
  </g>

  <text x="360" y="305" text-anchor="middle" font-size="11" fill="#a04000">
    У инновационного продукта стадия зрелости короткая, а смена технологических поколений быстрая.
  </text>
</svg>
