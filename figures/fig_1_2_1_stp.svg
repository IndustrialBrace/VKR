<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 220" font-family="Times New Roman, serif" font-size="13">
  <text x="360" y="22" text-anchor="middle" font-size="15">Модель STP: сегментация — таргетирование — позиционирование</text>

  <defs>
    <marker id="arr2" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#234"/>
    </marker>
  </defs>

  <g>
    <rect x="40"  y="60" width="180" height="100" rx="8" fill="#cfe2f3" stroke="#234"/>
    <text x="130" y="88"  text-anchor="middle" font-weight="normal">Segmentation</text>
    <text x="130" y="106" text-anchor="middle" font-size="11">Сегментация рынка</text>
    <text x="130" y="122" text-anchor="middle" font-size="11">по потребностям</text>
    <text x="130" y="138" text-anchor="middle" font-size="11">и поведению</text>

    <rect x="270" y="60" width="180" height="100" rx="8" fill="#9fc5e8" stroke="#234"/>
    <text x="360" y="88"  text-anchor="middle" font-weight="normal">Targeting</text>
    <text x="360" y="106" text-anchor="middle" font-size="11">Выбор сегментов</text>
    <text x="360" y="122" text-anchor="middle" font-size="11">по привлекательности</text>
    <text x="360" y="138" text-anchor="middle" font-size="11">и доступности</text>

    <rect x="500" y="60" width="180" height="100" rx="8" fill="#6fa8dc" stroke="#234"/>
    <text x="590" y="88"  text-anchor="middle" font-weight="normal" fill="#fff">Positioning</text>
    <text x="590" y="106" text-anchor="middle" font-size="11" fill="#fff">Позиционирование</text>
    <text x="590" y="122" text-anchor="middle" font-size="11" fill="#fff">в сознании ауд��тории</text>
    <text x="590" y="138" text-anchor="middle" font-size="11" fill="#fff">относительно конкурентов</text>

    <line x1="220" y1="110" x2="270" y2="110" stroke="#234" stroke-width="2" marker-end="url(#arr2)"/>
    <line x1="450" y1="110" x2="500" y2="110" stroke="#234" stroke-width="2" marker-end="url(#arr2)"/>
  </g>
</svg>
