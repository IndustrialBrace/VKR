<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 320" font-family="Times New Roman, serif" font-size="13">
  <text x="360" y="22" text-anchor="middle" font-size="15">Области применения биометрии в банковском и смежных секторах</text>

  <g>
    <circle cx="360" cy="170" r="58" fill="#fff2cc" stroke="#234" stroke-width="1.4"/>
    <text x="360" y="168" text-anchor="middle" font-weight="normal">Биометрия</text>
    <text x="360" y="184" text-anchor="middle" font-size="11">через ЕБС</text>
  </g>

  <g font-size="12">
    <rect x="40"  y="60"  width="160" height="56" rx="6" fill="#cfe2f3" stroke="#234"/>
    <text x="120" y="82"  text-anchor="middle">Платежи</text>
    <text x="120" y="100" text-anchor="middle" font-size="11">биоэквайринг, СБП</text>

    <rect x="40"  y="220" width="160" height="56" rx="6" fill="#cfe2f3" stroke="#234"/>
    <text x="120" y="242" text-anchor="middle">Контроль доступа</text>
    <text x="120" y="260" text-anchor="middle" font-size="11">СКУД, проход</text>

    <rect x="280" y="270" width="160" height="56" rx="6" fill="#cfe2f3" stroke="#234"/>
    <text x="360" y="292" text-anchor="middle">Транспорт</text>
    <text x="360" y="310" text-anchor="middle" font-size="11">оплата проезда</text>

    <rect x="520" y="60"  width="160" height="56" rx="6" fill="#cfe2f3" stroke="#234"/>
    <text x="600" y="82"  text-anchor="middle">Госуслуги и ЕСИА</text>
    <text x="600" y="100" text-anchor="middle" font-size="11">удалённая идент.</text>

    <rect x="520" y="220" width="160" height="56" rx="6" fill="#cfe2f3" stroke="#234"/>
    <text x="600" y="242" text-anchor="middle">Возрастная верифика-</text>
    <text x="600" y="258" text-anchor="middle">ция, заселение</text>

    <rect x="280" y="50"  width="160" height="56" rx="6" fill="#cfe2f3" stroke="#234"/>
    <text x="360" y="72"  text-anchor="middle">Открытие счёта</text>
    <text x="360" y="90"  text-anchor="middle" font-size="11">онлайн-обслуживание</text>
  </g>

  <g stroke="#234" stroke-width="1">
    <line x1="200" y1="88"  x2="305" y2="148"/>
    <line x1="200" y1="248" x2="310" y2="195"/>
    <line x1="360" y1="106" x2="360" y2="112"/>
    <line x1="360" y1="228" x2="360" y2="270"/>
    <line x1="520" y1="88"  x2="415" y2="148"/>
    <line x1="520" y1="248" x2="412" y2="195"/>
  </g>
