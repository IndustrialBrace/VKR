<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 460" font-family="Times New Roman, serif" font-size="13">
  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#234"/>
    </marker>
    <marker id="arrR" viewBox="0 0 10 10" refX="1" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M10,0 L0,5 L10,10 z" fill="#234"/>
    </marker>
  </defs>

  <text x="410" y="22" text-anchor="middle" font-size="15">
    Архитектура взаимодействия Face2 с ГИС ЕБС в контуре коммерческой биометрической системы
  </text>

  <!-- Layer 1: User -->
  <g>
    <rect x="40" y="60" width="170" height="70" rx="8" fill="#e6f0fb" stroke="#234"/>
    <text x="125" y="86" text-anchor="middle" font-weight="normal">Гражданин</text>
    <text x="125" y="104" text-anchor="middle" font-size="11">сдача биометрии</text>
    <text x="125" y="120" text-anchor="middle" font-size="11">через ЕСИА / Госуслуги Биометрия</text>
  </g>

  <!-- Layer 2: ГИС ЕБС -->
  <g>
    <rect x="320" y="55" width="220" height="80" rx="8" fill="#fff2cc" stroke="#234" stroke-width="1.4"/>
    <text x="430" y="80" text-anchor="middle" font-size="14">ГИС ЕБС</text>
    <text x="430" y="98" text-anchor="middle" font-size="11">оператор АО «ЦБТ»</text>
    <text x="430" y="114" text-anchor="middle" font-size="11">119 млн векторов (31.12.2025)</text>
    <text x="430" y="128" text-anchor="middle" font-size="11">регулирование — 572-ФЗ</text>
  </g>

  <!-- Layer 3: КБС Face2 -->
  <g>
    <rect x="270" y="200" width="320" height="100" rx="8" fill="#dff0d8" stroke="#234" stroke-width="1.4"/>
    <text x="430" y="222" text-anchor="middle" font-size="14">КБС Face2 (ПАО «Ак Барс Банк»)</text>
    <text x="430" y="240" text-anchor="middle" font-size="11">Аккредитация Минцифры — Решение № 4-А (15.11.2023)</text>
    <text x="430" y="256" text-anchor="middle" font-size="11">Сертификация ФСБ и ФСТЭК</text>
    <text x="430" y="272" text-anchor="middle" font-size="11">Реестр отечественного ПО; № 101 в перечне по № 115-ФЗ</text>
    <text x="430" y="290" text-anchor="middle" font-size="11">Стаж в ЕБС с 10.07.2018; алгоритм 99,5 %, ≈ 2 с</text>
  </g>

  <!-- Layer 4: продуктовая линейка -->
  <g font-size="12">
    <rect x="40"  y="355" width="160" height="70" rx="6" fill="#fff" stroke="#234"/>
    <text x="120" y="378" text-anchor="middle" font-weight="normal">Face2Pay</text>
    <text x="120" y="396" text-anchor="middle" font-size="10">биоэквайринг,</text>
    <text x="120" y="410" text-anchor="middle" font-size="10">оплата по лицу</text>

    <rect x="220" y="355" width="160" height="70" rx="6" fill="#fff" stroke="#234"/>
    <text x="300" y="378" text-anchor="middle" font-weight="normal">Face2Pass</text>
    <text x="300" y="396" text-anchor="middle" font-size="10">СКУД, проход</text>
    <text x="300" y="410" text-anchor="middle" font-size="10">по лицу через ЕБС</text>

    <rect x="400" y="355" width="160" height="70" rx="6" fill="#fff" stroke="#234"/>
    <text x="480" y="378" text-anchor="middle" font-weight="normal">Face2Check-in</text>
    <text x="480" y="396" text-anchor="middle" font-size="10">подтверждение возраста,</text>
    <text x="480" y="410" text-anchor="middle" font-size="10">регистрация в гостинице</text>

    <rect x="580" y="355" width="200" height="70" rx="6" fill="#fff" stroke="#234"/>
    <text x="680" y="378" text-anchor="middle" font-weight="normal">КБС под ключ</text>
    <text x="680" y="396" text-anchor="middle" font-size="10">для аккредитованных</text>
    <text x="680" y="410" text-anchor="middle" font-size="10">операторов биометрии</text>
  </g>

  <!-- Заказчик уровня 2 -->
  <g>
    <rect x="640" y="60" width="150" height="70" rx="8" fill="#e6f0fb" stroke="#234"/>
    <text x="715" y="86" text-anchor="middle">Заказчик уровня 2</text>
    <text x="715" y="104" text-anchor="middle" font-size="11">ритейл, транспорт,</text>
    <text x="715" y="120" text-anchor="middle" font-size="11">гостиницы, СКУД</text>
  </g>

  <!-- arrows -->
  <!-- gражданин -> ЕБС -->
  <line x1="210" y1="95" x2="318" y2="95" stroke="#234" stroke-width="1.4" marker-end="url(#arr)"/>
  <text x="264" y="86" text-anchor="middle" font-size="10">биометрический образец</text>

  <!-- ЕБС <-> КБС Face2 -->
  <line x1="430" y1="138" x2="430" y2="198" stroke="#234" stroke-width="1.4" marker-end="url(#arr)" marker-start="url(#arrR)"/>
  <text x="442" y="170" font-size="10">векторы / запросы верификации</text>

  <!-- КБС -> продукты -->
  <line x1="370" y1="300" x2="200" y2="354" stroke="#234" stroke-width="1.2" marker-end="url(#arr)"/>
  <line x1="410" y1="300" x2="320" y2="354" stroke="#234" stroke-width="1.2" marker-end="url(#arr)"/>
  <line x1="450" y1="300" x2="500" y2="354" stroke="#234" stroke-width="1.2" marker-end="url(#arr)"/>
  <line x1="500" y1="300" x2="660" y2="354" stroke="#234" stroke-width="1.2" marker-end="url(#arr)"/>

  <!-- Заказчик -> продукты (уровень 2) -->
  <path d="M 715,130 C 715,200 715,280 555,390" fill="none" stroke="#666" stroke-dasharray="4,3" stroke-width="1.2" marker-end="url(#arrR)"/>
  <text x="730" y="220" font-size="10">подключение</text>
  <text x="730" y="234" font-size="10">по транзакц.</text>
  <text x="730" y="248" font-size="10">или абонент.</text>
  <text x="730" y="262" font-size="10">модели</text>
</svg>
