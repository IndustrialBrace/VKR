<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 420" font-family="Times New Roman, serif" font-size="13">
  <text x="380" y="22" text-anchor="middle" font-size="15">
    Динамика биометрических и QR-операций в РФ, II кв. 2024 — II кв. 2025
  </text>

  <!-- two panels: left = number of operations (bars), right = avg check (line)  -->

  <!-- LEFT panel: bars  -->
  <g>
    <text x="180" y="50" text-anchor="middle" font-size="13">Количество операций, млн</text>

    <!-- axes -->
    <line x1="80" y1="360" x2="380" y2="360" stroke="#333"/>
    <line x1="80" y1="80"  x2="80"  y2="360" stroke="#333"/>

    <!-- y-grid: max ≈ 1000 (для QR), шаг 200 -->
    <g stroke="#bbb" stroke-dasharray="2,3">
      <line x1="80" y1="304" x2="380" y2="304"/>
      <line x1="80" y1="248" x2="380" y2="248"/>
      <line x1="80" y1="192" x2="380" y2="192"/>
      <line x1="80" y1="136" x2="380" y2="136"/>
    </g>
    <g font-size="11" fill="#555" text-anchor="end">
      <text x="74" y="364">0</text>
      <text x="74" y="308">200</text>
      <text x="74" y="252">400</text>
      <text x="74" y="196">600</text>
      <text x="74" y="140">800</text>
      <text x="74" y="84">1000</text>
    </g>

    <!-- 3 группы по 2 столбика (биометрия + QR). Шкала 1px = ~3.5 млн. высота макс 280px -->
    <!-- II кв. 2024: bio 5,5 (-) ; QR н/д -->
    <!-- I кв. 2025: bio 40 ; QR 790 -->
    <!-- II кв. 2025: bio 60 ; QR 990 -->
    <!-- center groups at x=140, 220, 300, ширина бара 24, gap 4 -->
    <g>
      <!-- II 2024 -->
      <rect x="120" y="354" width="24" height="6" fill="#6fa8dc" stroke="#234"/>
      <rect x="148" y="358" width="24" height="2" fill="#cccccc" stroke="#234" stroke-dasharray="2,2"/>
      <text x="160" y="375" text-anchor="middle" font-size="11">II 2024</text>
      <text x="132" y="350" text-anchor="middle" font-size="10">5,5</text>
      <text x="160" y="350" text-anchor="middle" font-size="10">н/д</text>

      <!-- I 2025 -->
      <rect x="200" y="349" width="24" height="11" fill="#6fa8dc" stroke="#234"/>
      <rect x="228" y="139" width="24" height="221" fill="#f4cccc" stroke="#234"/>
      <text x="240" y="375" text-anchor="middle" font-size="11">I 2025</text>
      <text x="212" y="345" text-anchor="middle" font-size="10">40</text>
      <text x="240" y="135" text-anchor="middle" font-size="10">790</text>

      <!-- II 2025 -->
      <rect x="280" y="343" width="24" height="17" fill="#6fa8dc" stroke="#234"/>
      <rect x="308" y="83"  width="24" height="277" fill="#cc0000" stroke="#234"/>
      <text x="320" y="375" text-anchor="middle" font-size="11">II 2025</text>
      <text x="292" y="339" text-anchor="middle" font-size="10">60</text>
      <text x="320" y="79" text-anchor="middle" font-size="10">990</text>
    </g>

    <!-- legend -->
    <g font-size="11">
      <rect x="100" y="392" width="14" height="10" fill="#6fa8dc" stroke="#234"/>
      <text x="118" y="401">биометрия</text>
      <rect x="200" y="392" width="14" height="10" fill="#cc0000" stroke="#234"/>
      <text x="218" y="401">QR</text>
    </g>
  </g>

  <!-- RIGHT panel: line for avg check + cumulative bio users -->
  <g>
    <text x="580" y="50" text-anchor="middle" font-size="13">Пользователи ЕБС и средний чек</text>

    <line x1="430" y1="360" x2="730" y2="360" stroke="#333"/>
    <line x1="430" y1="80"  x2="430" y2="360" stroke="#333"/>
    <line x1="730" y1="80"  x2="730" y2="360" stroke="#333"/>

    <g stroke="#bbb" stroke-dasharray="2,3">
      <line x1="430" y1="304" x2="730" y2="304"/>
      <line x1="430" y1="248" x2="730" y2="248"/>
      <line x1="430" y1="192" x2="730" y2="192"/>
      <line x1="430" y1="136" x2="730" y2="136"/>
    </g>

    <!-- left axis: пользователи ЕБС, млн (0..12) -->
    <g font-size="11" fill="#1a5a92" text-anchor="end">
      <text x="424" y="364">0</text>
      <text x="424" y="308">2,4</text>
      <text x="424" y="252">4,8</text>
      <text x="424" y="196">7,2</text>
      <text x="424" y="140">9,6</text>
      <text x="424" y="84">12</text>
    </g>
    <text x="426" y="70" text-anchor="end" font-size="11" fill="#1a5a92">польз. ЕБС, млн</text>

    <!-- right axis: средний чек, руб (0..1000) -->
    <g font-size="11" fill="#a04000" text-anchor="start">
      <text x="736" y="364">0</text>
      <text x="736" y="308">200</text>
      <text x="736" y="252">400</text>
      <text x="736" y="196">600</text>
      <text x="736" y="140">800</text>
      <text x="736" y="84">1000</text>
    </g>
    <text x="734" y="70" font-size="11" fill="#a04000">ср. чек, руб.</text>

    <!-- x labels -->
    <g font-size="11" text-anchor="middle">
      <text x="490" y="378">II 2024</text>
      <text x="580" y="378">I 2025</text>
      <text x="670" y="378">II 2025</text>
    </g>

    <!-- линия пользователей ЕБС: 5 млн -> 7 -> 10 (пересчёт высоты по шкале 12 макс) -->
    <!-- y = 360 - (val/12)*280 -->
    <!-- 5 -> 243; 7 -> 197; 10 -> 127 -->
    <polyline points="490,243 580,197 670,127" fill="none" stroke="#1a5a92" stroke-width="2.2"/>
    <g fill="#1a5a92">
      <circle cx="490" cy="243" r="4"/>
      <circle cx="580" cy="197" r="4"/>
      <circle cx="670" cy="127" r="4"/>
    </g>
    <text x="490" y="234" text-anchor="middle" font-size="11" fill="#1a5a92">&lt; 5</text>
    <text x="580" y="188" text-anchor="middle" font-size="11" fill="#1a5a92">~ 7</text>
    <text x="670" y="118" text-anchor="middle" font-size="11" fill="#1a5a92">&gt; 10</text>

    <!-- средний чек: ~770 в I и II квартале 2025; в II кв. 2024 — н/д. Шкала макс 1000.  -->
    <!-- y = 360 - (val/1000)*280; 770 -> 144 -->
    <polyline points="580,144 670,144" fill="none" stroke="#a04000" stroke-width="2.2" stroke-dasharray="6,4"/>
    <g fill="#a04000">
      <circle cx="580" cy="144" r="4"/>
      <circle cx="670" cy="144" r="4"/>
    </g>
    <text x="625" y="135" text-anchor="middle" font-size="11" fill="#a04000">774 / 770 руб.</text>
  </g>
</svg>
