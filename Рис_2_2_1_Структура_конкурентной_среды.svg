<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 980" font-family="PT Sans, DejaVu Sans, Arial, sans-serif" font-size="14">
  <!-- =================== STYLES =================== -->
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#3b4b66"/>
    </marker>
    <style><![CDATA[
      .market-hdr   { fill:#1f3a5f; stroke:#102a4a; stroke-width:1.5; }
      .market-text  { fill:#ffffff; font-weight:700; font-size:20px; }
      .layer-hdr    { fill:#2e5d8c; stroke:#1f3a5f; stroke-width:1; }
      .layer-hdr-st { fill:#7a4a2a; stroke:#5a3520; stroke-width:1; }
      .layer-body   { fill:#f3f7fb; stroke:#2e5d8c; stroke-width:1.2; }
      .layer-body-st{ fill:#fbf4ec; stroke:#7a4a2a; stroke-width:1.2; }
      .layer-title  { fill:#ffffff; font-weight:700; font-size:14px; }
      .layer-sub    { fill:#1f3a5f; font-size:12.5px; }
      .layer-sub-st { fill:#5a3520; font-size:12.5px; }
      .firm-box     { fill:#ffffff; stroke:#2e5d8c; stroke-width:1; }
      .firm-box-st  { fill:#ffffff; stroke:#7a4a2a; stroke-width:1; }
      .firm-text    { fill:#102a4a; font-size:13px; font-weight:600; }
      .firm-text-st { fill:#3a2412; font-size:13px; font-weight:600; }
      .firm-note    { fill:#3b4b66; font-size:11.5px; }
      .conn         { stroke:#3b4b66; stroke-width:1.4; fill:none; }
      .legal-band   { fill:#eef2f8; stroke:#c7d2e0; stroke-width:1; }
      .legal-text   { fill:#1f3a5f; font-size:12px; font-style:italic; }
    ]]></style>
  </defs>

  <!-- =================== TITLE =================== -->
  <text x="700" y="28" text-anchor="middle" font-size="16" font-weight="700" fill="#102a4a">
    Рис. 2.2.1. Структура конкурентной среды на российском рынке биометрии
  </text>

  <!-- =================== MARKET HEADER =================== -->
  <rect class="market-hdr" x="350" y="55" width="700" height="58" rx="8" ry="8"/>
  <text class="market-text" x="700" y="83" text-anchor="middle">Российский рынок биометрических технологий</text>
  <text x="700" y="103" text-anchor="middle" fill="#cdd9ec" font-size="13" font-style="italic">сегменты B2B / B2G / B2C</text>

  <!-- vertical drop -->
  <line class="conn" x1="700" y1="113" x2="700" y2="160"/>
  <!-- horizontal bus across 4 columns -->
  <line class="conn" x1="200" y1="160" x2="1200" y2="160"/>
  <!-- 4 vertical drops to layer headers -->
  <line class="conn" x1="200"  y1="160" x2="200"  y2="195"/>
  <line class="conn" x1="500"  y1="160" x2="500"  y2="195"/>
  <line class="conn" x1="800"  y1="160" x2="800"  y2="195"/>
  <line class="conn" x1="1200" y1="160" x2="1200" y2="195"/>

  <!-- =================== LAYER 1: BANKS =================== -->
  <g>
    <rect class="layer-body"  x="60"  y="195" width="280" height="270" rx="8" ry="8"/>
    <rect class="layer-hdr"   x="60"  y="195" width="280" height="68"  rx="8" ry="8"/>
    <rect class="layer-hdr"   x="60"  y="245" width="280" height="18"/>
    <text class="layer-title" x="200" y="220" text-anchor="middle">Слой 1. Банки-разработчики</text>
    <text class="layer-title" x="200" y="240" text-anchor="middle">собственных биосервисов</text>
    <text class="layer-sub"   x="200" y="282" text-anchor="middle">биометрия = внутренний сервис</text>
    <text class="layer-sub"   x="200" y="299" text-anchor="middle">+ коммерческий продукт</text>

    <!-- firm boxes -->
    <rect class="firm-box" x="80"  y="318" width="240" height="60" rx="6" ry="6"/>
    <text class="firm-text" x="200" y="340" text-anchor="middle">ПАО Сбербанк</text>
    <text class="firm-note" x="200" y="358" text-anchor="middle">«Оплата улыбкой» / СберPay Smile</text>
    <text class="firm-note" x="200" y="372" text-anchor="middle">700+ тыс. терминалов</text>

    <rect class="firm-box" x="80"  y="388" width="240" height="60" rx="6" ry="6"
          stroke-width="2" stroke="#c8941c" fill="#fff8e6"/>
    <text class="firm-text" x="200" y="410" text-anchor="middle" fill="#7a5a10">ПАО «АК БАРС» БАНК</text>
    <text class="firm-note" x="200" y="428" text-anchor="middle" fill="#7a5a10">линейка Face2 (Pay/Pass/Check-in/КБС)</text>
    <text class="firm-note" x="200" y="442" text-anchor="middle" fill="#7a5a10">аккредитация Минцифры № 4-А</text>
  </g>

  <!-- =================== LAYER 2: VENDORS =================== -->
  <g>
    <rect class="layer-body"  x="360" y="195" width="280" height="270" rx="8" ry="8"/>
    <rect class="layer-hdr"   x="360" y="195" width="280" height="68"  rx="8" ry="8"/>
    <rect class="layer-hdr"   x="360" y="245" width="280" height="18"/>
    <text class="layer-title" x="500" y="220" text-anchor="middle">Слой 2. Технологические</text>
    <text class="layer-title" x="500" y="240" text-anchor="middle">вендоры алгоритмов и платформ</text>
    <text class="layer-sub"   x="500" y="282" text-anchor="middle">B2B/B2G-лицензирование</text>
    <text class="layer-sub"   x="500" y="299" text-anchor="middle">алгоритмов распознавания</text>

    <rect class="firm-box" x="380" y="318" width="240" height="40" rx="6" ry="6"/>
    <text class="firm-text" x="500" y="335" text-anchor="middle">VisionLabs</text>
    <text class="firm-note" x="500" y="351" text-anchor="middle">LUNA, NIST FRTE, 38 стран</text>

    <rect class="firm-box" x="380" y="368" width="240" height="40" rx="6" ry="6"/>
    <text class="firm-text" x="500" y="385" text-anchor="middle">NtechLab</text>
    <text class="firm-note" x="500" y="401" text-anchor="middle">FindFace, безопасный город</text>

    <rect class="firm-box" x="380" y="418" width="240" height="40" rx="6" ry="6"/>
    <text class="firm-text" x="500" y="435" text-anchor="middle">Tevian и др.</text>
    <text class="firm-note" x="500" y="451" text-anchor="middle">видеоаналитика, СКУД-ядро</text>
  </g>

  <!-- =================== LAYER 3: FULL-CYCLE =================== -->
  <g>
    <rect class="layer-body"  x="660" y="195" width="280" height="270" rx="8" ry="8"/>
    <rect class="layer-hdr"   x="660" y="195" width="280" height="68"  rx="8" ry="8"/>
    <rect class="layer-hdr"   x="660" y="245" width="280" height="18"/>
    <text class="layer-title" x="800" y="220" text-anchor="middle">Слой 3. Производители</text>
    <text class="layer-title" x="800" y="240" text-anchor="middle">полного цикла СКУД</text>
    <text class="layer-sub"   x="800" y="282" text-anchor="middle">ПО + собственное оборудование</text>
    <text class="layer-sub"   x="800" y="299" text-anchor="middle">+ интеграция и сервис</text>

    <rect class="firm-box" x="680" y="318" width="240" height="55" rx="6" ry="6"/>
    <text class="firm-text" x="800" y="338" text-anchor="middle">OVISION (Ханты-Мансийск)</text>
    <text class="firm-note" x="800" y="355" text-anchor="middle">терминалы OGATE One/Mini/Thermo</text>
    <text class="firm-note" x="800" y="369" text-anchor="middle">РЖД, Мосэнергосбыт</text>

    <rect class="firm-box" x="680" y="383" width="240" height="55" rx="6" ry="6"/>
    <text class="firm-text" x="800" y="403" text-anchor="middle">BioSmart (Прософт-Биометрикс)</text>
    <text class="firm-note" x="800" y="420" text-anchor="middle">биотерминалы, СКУД</text>
    <text class="firm-note" x="800" y="434" text-anchor="middle">учёт рабочего времени</text>

    <text class="firm-note" x="800" y="455" text-anchor="middle" font-style="italic">и другие производители полного цикла</text>
  </g>

  <!-- =================== STATE INFRASTRUCTURE =================== -->
  <g>
    <rect class="layer-body-st" x="1060" y="195" width="280" height="270" rx="8" ry="8"/>
    <rect class="layer-hdr-st"  x="1060" y="195" width="280" height="68"  rx="8" ry="8"/>
    <rect class="layer-hdr-st"  x="1060" y="245" width="280" height="18"/>
    <text class="layer-title"   x="1200" y="220" text-anchor="middle">Государственная</text>
    <text class="layer-title"   x="1200" y="240" text-anchor="middle">инфраструктура и регулятор</text>
    <text class="layer-sub-st"  x="1200" y="282" text-anchor="middle">обязательный контур допуска</text>
    <text class="layer-sub-st"  x="1200" y="299" text-anchor="middle">на рынок биометрии физлиц</text>

    <rect class="firm-box-st" x="1080" y="318" width="240" height="55" rx="6" ry="6"/>
    <text class="firm-text-st" x="1200" y="338" text-anchor="middle">АО «ЦБТ»</text>
    <text class="firm-note"    x="1200" y="355" text-anchor="middle">оператор ЕБС / ГИС ЕБС</text>
    <text class="firm-note"    x="1200" y="369" text-anchor="middle">подтверждение личности</text>

    <rect class="firm-box-st" x="1080" y="383" width="240" height="55" rx="6" ry="6"/>
    <text class="firm-text-st" x="1200" y="403" text-anchor="middle">ЕСИА / Госуслуги</text>
    <text class="firm-note"    x="1200" y="420" text-anchor="middle">учётная запись пользователя</text>
    <text class="firm-note"    x="1200" y="434" text-anchor="middle">привязка биометрии к ЕСИА</text>

    <text class="firm-note" x="1200" y="455" text-anchor="middle" font-style="italic">572-ФЗ, 574-ФЗ, № 115-ФЗ</text>
  </g>

  <!-- =================== ARROWS BETWEEN LAYERS AND STATE INFRA =================== -->
  <!-- 3 layers connect to state infra via dashed line (regulatory dependency) -->
  <line x1="340" y1="510" x2="1060" y2="510" stroke="#7a4a2a" stroke-width="1.2" stroke-dasharray="6 4"/>
  <!-- vertical short ticks from each layer down to the dashed line -->
  <line x1="200" y1="465" x2="200" y2="510" stroke="#7a4a2a" stroke-width="1.2" stroke-dasharray="6 4"/>
  <line x1="500" y1="465" x2="500" y2="510" stroke="#7a4a2a" stroke-width="1.2" stroke-dasharray="6 4"/>
  <line x1="800" y1="465" x2="800" y2="510" stroke="#7a4a2a" stroke-width="1.2" stroke-dasharray="6 4"/>
  <line x1="1200" y1="465" x2="1200" y2="510" stroke="#7a4a2a" stroke-width="1.2"/>
  <!-- horizontal arrow from state infra block side into the bus -->
  <text x="700" y="528" text-anchor="middle" class="legal-text">
    регуляторный контур: аккредитация Минцифры по правилам КБС, статус оператора по № 115-ФЗ, сертификация ФСБ и ФСТЭК
  </text>

  <!-- =================== POSITIONING OF FACE2 =================== -->
  <g>
    <rect class="legal-band" x="60" y="560" width="1280" height="120" rx="8" ry="8"/>
    <text x="80" y="585" font-weight="700" fill="#102a4a" font-size="14">Позиционирование Face2 в трёхслойной структуре:</text>

    <!-- Three columns of differentiation -->
    <text x="80"  y="612" font-weight="700" fill="#1f3a5f">— относительно Слоя 1:</text>
    <text x="80"  y="630" fill="#1f3a5f">не конкурирует со Сбером по масштабу B2C-эквайринга;</text>
    <text x="80"  y="647" fill="#1f3a5f">занимает региональную и B2B/B2G-нишу через</text>
    <text x="80"  y="664" fill="#1f3a5f">аккредитацию № 4-А и статус по № 115-ФЗ.</text>

    <text x="540" y="612" font-weight="700" fill="#1f3a5f">— относительно Слоя 2:</text>
    <text x="540" y="630" fill="#1f3a5f">собственные алгоритмы (≈ 99,5%) снимают</text>
    <text x="540" y="647" fill="#1f3a5f">зависимость от VisionLabs и NtechLab;</text>
    <text x="540" y="664" fill="#1f3a5f">пробел — независимая верификация (NIST FRTE).</text>

    <text x="940" y="612" font-weight="700" fill="#1f3a5f">— относительно Слоя 3:</text>
    <text x="940" y="630" fill="#1f3a5f">нет собственного производства терминалов,</text>
    <text x="940" y="647" fill="#1f3a5f">но есть банковская экосистема и право</text>
    <text x="940" y="664" fill="#1f3a5f">регистрации БПд граждан в ЕБС.</text>
  </g>

  <!-- =================== LEGEND =================== -->
  <g transform="translate(60, 705)">
    <text x="0" y="0" font-weight="700" fill="#102a4a" font-size="13">Условные обозначения:</text>

    <rect x="0"   y="14" width="22" height="14" class="layer-hdr"/>
    <text x="30"  y="25" fill="#1f3a5f">слой коммерческих игроков рынка</text>

    <rect x="320" y="14" width="22" height="14" class="layer-hdr-st"/>
    <text x="350" y="25" fill="#1f3a5f">государственная инфраструктура и регулятор</text>

    <rect x="700" y="14" width="22" height="14" fill="#fff8e6" stroke="#c8941c" stroke-width="2"/>
    <text x="730" y="25" fill="#1f3a5f">объект исследования — Face2 (АК БАРС БАНК)</text>

    <line x1="1060" y1="21" x2="1100" y2="21" stroke="#7a4a2a" stroke-width="1.2" stroke-dasharray="6 4"/>
    <text x="1108" y="25" fill="#1f3a5f">связь с регуляторным контуром</text>
  </g>

  <!-- =================== SOURCE =================== -->
  <text x="60" y="770" font-style="italic" fill="#3b4b66" font-size="12">
    Источник: составлено автором по данным [27; 32; 37; 38; 39; 41].
  </text>
</svg>
