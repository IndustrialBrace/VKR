<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 880" font-family="PT Sans, DejaVu Sans, Arial, sans-serif" font-size="14">
  <!-- =================== STYLES =================== -->
  <defs>
    <style><![CDATA[
      .title       { fill:#102a4a; font-weight:700; font-size:16px; }
      .axis-hdr    { fill:#1f3a5f; font-weight:700; font-size:14px; }
      .axis-sub    { fill:#3b4b66; font-size:12px; font-style:italic; }
      .stage-box   { fill:#1f3a5f; stroke:#102a4a; stroke-width:1; }
      .stage-text  { fill:#ffffff; font-weight:700; font-size:13.5px; }
      .stage-tag   { fill:#cdd9ec; font-size:11.5px; font-style:italic; }
      .ref-bar     { fill:#2e5d8c; stroke:#1f3a5f; stroke-width:1; }
      .face-bar    { fill:#c8941c; stroke:#7a5a10; stroke-width:1; }
      .face-bar-lt { fill:#fbe8b8; stroke:#7a5a10; stroke-width:1; }
      .ref-text    { fill:#ffffff; font-size:11.5px; font-weight:600; }
      .face-text   { fill:#3a2412; font-size:11.5px; font-weight:600; }
      .ref-note    { fill:#1f3a5f; font-size:11.5px; }
      .face-note   { fill:#5a3520; font-size:11.5px; }
      .axis-line   { stroke:#3b4b66; stroke-width:1.2; }
      .legend-text { fill:#1f3a5f; font-size:12px; }
      .legend-hdr  { fill:#102a4a; font-weight:700; font-size:13px; }
      .source      { fill:#3b4b66; font-size:12px; font-style:italic; }
      .panel       { fill:#f3f7fb; stroke:#c7d2e0; stroke-width:1; }
    ]]></style>
  </defs>

  <!-- =================== TITLE =================== -->
  <text class="title" x="700" y="30" text-anchor="middle">
    Рис. 2.3.1. Воронка продвижения Face2 в сопоставлении с эталонной воронкой биометрического продукта
  </text>
  <text class="title" x="700" y="50" text-anchor="middle">
    в банковском секторе
  </text>

  <!-- =================== SIDE HEADERS =================== -->
  <text class="axis-hdr" x="380" y="84" text-anchor="middle">
    ◄  Эталонная воронка биометрии в банке
  </text>
  <text class="axis-sub" x="380" y="100" text-anchor="middle">
    (по табл. 1.2.4 и параграфу 1.3)
  </text>

  <text class="axis-hdr" x="1020" y="84" text-anchor="middle">
    Воронка Face2 (фактическая раскладка активностей)  ►
  </text>
  <text class="axis-sub" x="1020" y="100" text-anchor="middle">
    по данным [27; 28, с. 28–33; 36; 40]
  </text>

  <!-- =================== CENTRAL AXIS =================== -->
  <line class="axis-line" x1="565" y1="115" x2="565" y2="700"/>
  <line class="axis-line" x1="835" y1="115" x2="835" y2="700"/>

  <!-- =================== STAGE 1: ОСВЕДОМЛЁННОСТЬ (single) =================== -->
  <!-- center y = 150; ref width = 224; face width = 56 -->
  <rect class="stage-box" x="565" y="125" width="270" height="50" rx="4"/>
  <text class="stage-text" x="700" y="150" text-anchor="middle">Осведомлённость</text>
  <text class="stage-tag"  x="700" y="167" text-anchor="middle">верх воронки, pull-каналы</text>

  <rect class="ref-bar" x="341" y="135" width="224" height="32"/>
  <text class="ref-text" x="350" y="155">массовая редакционная программа</text>

  <rect class="face-bar" x="835" y="135" width="56" height="32"/>
  <text class="face-note" x="900" y="148">точечные пресс-релизы;</text>
  <text class="face-note" x="900" y="163">пилоты в РТ; упоминание в «Ведомостях» [38]</text>

  <!-- =================== STAGE 2: ИНТЕРЕС (single) =================== -->
  <!-- center y = 215 -->
  <rect class="stage-box" x="565" y="190" width="270" height="50" rx="4"/>
  <text class="stage-text" x="700" y="215" text-anchor="middle">Интерес</text>
  <text class="stage-tag"  x="700" y="232" text-anchor="middle">сайт, посадочные, CTA-механика</text>

  <rect class="ref-bar" x="369" y="200" width="196" height="32"/>
  <text class="ref-text" x="378" y="220">сайт + CTA «заявка на пилот / демо»</text>

  <rect class="face-bar" x="835" y="200" width="42" height="32"/>
  <text class="face-note" x="887" y="213">сайт face2.ru; описание в материалах банка;</text>
  <text class="face-note" x="887" y="228">CTA-механики и формы заявки на пилот нет</text>

  <!-- =================== STAGE 3: ДОВЕРИЕ — ЯДРО (dual on Face2 side) =================== -->
  <!-- center y = 305; ref width = 336; face content width = 336; face reach width = 84 -->
  <rect class="stage-box" x="565" y="265" width="270" height="80" rx="4"/>
  <text class="stage-text" x="700" y="295" text-anchor="middle">Доверие</text>
  <text class="stage-tag"  x="700" y="313" text-anchor="middle">расширенное ядро воронки</text>
  <text class="stage-tag"  x="700" y="329" text-anchor="middle">для биометрии в банке</text>

  <!-- ref bar (centered vertically at 305) -->
  <rect class="ref-bar" x="229" y="289" width="336" height="32"/>
  <text class="ref-text" x="238" y="309">равномерно широкий ключевой этап (по 1.3)</text>

  <!-- Face2 dual bars: содержательно + массовый охват -->
  <rect class="face-bar"    x="835" y="278" width="336" height="22"/>
  <text class="face-text"   x="844" y="293">содержательно: КБС, аккредитации Минцифры, ФСБ, ФСТЭК, № 115-ФЗ № 101, стаж в ЕБС с 10.07.2018</text>

  <rect class="face-bar-lt" x="835" y="306" width="84" height="22"/>
  <text class="face-note"   x="930" y="321">массовый охват — низкий: доказательная база подаётся языком специалистов</text>

  <!-- =================== STAGE 4: ПРОБНОЕ ИСПОЛЬЗОВАНИЕ (dual) =================== -->
  <!-- center y = 415; ref width = 224; face inner = 224; face outer = 21 -->
  <rect class="stage-box" x="565" y="375" width="270" height="80" rx="4"/>
  <text class="stage-text" x="700" y="405" text-anchor="middle">Пробное использование</text>
  <text class="stage-tag"  x="700" y="423" text-anchor="middle">демозоны, пилоты, доступ</text>
  <text class="stage-tag"  x="700" y="439" text-anchor="middle">к пользовательскому опыту</text>

  <rect class="ref-bar" x="341" y="399" width="224" height="32"/>
  <text class="ref-text" x="350" y="419">доступ для всех целевых регионов</text>

  <!-- Face2 dual bars: РТ + B2B / вне РТ -->
  <rect class="face-bar"    x="835" y="388" width="224" height="22"/>
  <text class="face-text"   x="844" y="403">РТ + B2B: 5000+ сотрудников, 200 биотерминалов, метро, библиотека РТ, АБО</text>

  <rect class="face-bar-lt" x="835" y="416" width="21" height="22"/>
  <text class="face-note"   x="864" y="431">вне РТ — фактически нулевая (нет публичных демоточек)</text>

  <!-- =================== STAGE 5: ПРИНЯТИЕ (single) =================== -->
  <!-- center y = 505; ref width = 196; face width = 112 -->
  <rect class="stage-box" x="565" y="480" width="270" height="50" rx="4"/>
  <text class="stage-text" x="700" y="505" text-anchor="middle">Принятие</text>
  <text class="stage-tag"  x="700" y="522" text-anchor="middle">оформленные публичные кейсы</text>

  <rect class="ref-bar" x="369" y="490" width="196" height="32"/>
  <text class="ref-text" x="378" y="510">кейс-стади и референсы федерального уровня</text>

  <rect class="face-bar" x="835" y="490" width="112" height="32"/>
  <text class="face-text" x="844" y="510">внедрения 200 / 500 / 5 000 / 15 000</text>
  <text class="face-note" x="955" y="510">— без публичных кейс-стади</text>

  <!-- =================== STAGE 6: ЛОЯЛЬНОСТЬ (single) =================== -->
  <!-- center y = 570; ref width = 140; face width = 28 -->
  <rect class="stage-box" x="565" y="545" width="270" height="50" rx="4"/>
  <text class="stage-text" x="700" y="570" text-anchor="middle">Лояльность</text>
  <text class="stage-tag"  x="700" y="587" text-anchor="middle">NPS, повторные продажи, референсы</text>

  <rect class="ref-bar" x="425" y="555" width="140" height="32"/>
  <text class="ref-text" x="434" y="575">программа удержания, NPS, кейсы</text>

  <rect class="face-bar" x="835" y="555" width="28" height="32"/>
  <text class="face-note" x="871" y="568">«Сливки» — программа банка в целом,</text>
  <text class="face-note" x="871" y="583">не Face2; отдельной программы нет</text>

  <!-- =================== AXIS LABELS (scale) =================== -->
  <text class="axis-sub" x="380" y="720" text-anchor="middle">плотность активностей по этапу (условные единицы)</text>
  <text class="axis-sub" x="1020" y="720" text-anchor="middle">плотность активностей по этапу (условные единицы)</text>

  <!-- =================== SUMMARY PANEL =================== -->
  <rect class="panel" x="60" y="745" width="1280" height="68" rx="8"/>
  <text class="legend-hdr" x="78" y="767">Архитектурный вывод по рисунку:</text>
  <text class="legend-text" x="78" y="787">
    у Face2 центральный этап «Доверие» содержательно перегружен (полный пул Physical evidence), но узок по массовому охвату; этап «Пробное использование» силён в РТ и B2B,
  </text>
  <text class="legend-text" x="78" y="803">
    но фактически нулевой за пределами Татарстана; полюса воронки — «Осведомлённость» и «Лояльность» — недогружены. Маркетинг воспроизводит структуру коммерческого присутствия из 2.2.
  </text>

  <!-- =================== LEGEND =================== -->
  <g transform="translate(60, 825)">
    <text class="legend-hdr" x="0" y="0">Условные обозначения:</text>

    <rect x="180" y="-12" width="22" height="14" class="ref-bar"/>
    <text class="legend-text" x="210" y="0">эталонная воронка (по 1.2.4 и 1.3)</text>

    <rect x="490" y="-12" width="22" height="14" class="face-bar"/>
    <text class="legend-text" x="520" y="0">Face2 — содержательная плотность / основная масса</text>

    <rect x="900" y="-12" width="22" height="14" class="face-bar-lt"/>
    <text class="legend-text" x="930" y="0">Face2 — массовый охват / распространение вне РТ</text>
  </g>

  <!-- =================== SOURCE =================== -->
  <text class="source" x="60" y="865">
    Источник: составлено автором по данным [27; 28, с. 28–33; 36; 38; 40]; ширина столбцов отражает плотность активностей по этапу воронки в условных единицах.
  </text>
</svg>
